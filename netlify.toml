[build]
  command = "npm run build"
  publish = "build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' blob:; worker-src 'self' blob:; connect-src 'self' https://gns-browser-production.up.railway.app https://*.supabase.co https://*.mapbox.com https://api.mapbox.com https://events.mapbox.com; img-src 'self' data: blob: https://*.mapbox.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.mapbox.com; font-src 'self' https://fonts.gstatic.com; child-src blob:;"

[build.environment]
  NODE_VERSION = "18"
